<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Velmora Themes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f0f0f;
      color: white;
    }

    header {
      background: black;
      padding: 20px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 25px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }

    .products {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 40px;
      flex-wrap: wrap;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      text-align: center;
    }

    .card h3 {
      margin-bottom: 10px;
    }

    footer {
      background: black;
      text-align: center;
      padding: 20px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>VELMORA THEMES</header>

<section class="hero">
  <h1>Wear Your Vibe</h1>
  <p>Premium Streetwear Collection</p>
  <a href="#" class="btn">Shop Now</a>
</section>

<section class="products">
  <div class="card">
    <h3>Black Hoodie</h3>
    <p>₹1499</p>
  </div>

  <div class="card">
    <h3>Oversized T-Shirt</h3>
    <p>₹999</p>
  </div>

  <div class="card">
    <h3>Joggers</h3>
    <p>₹1799</p>
  </div>
</section>

<footer>
  © 2026 Velmora Themes
</footer>

</body>
</html>
