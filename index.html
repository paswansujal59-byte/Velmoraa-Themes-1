<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velmora Themes</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

header {
  background: black;
  padding: 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  margin: 0;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

.hero {
  text-align: center;
  padding: 60px 20px;
}

.hero h1 {
  font-size: 45px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 30px;
}

.card {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  text-align: center;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.card h3 {
  margin: 10px 0;
}

.card p {
  margin-bottom: 10px;
}

button {
  background: white;
  border: none;
  padding: 10px 20px;
  margin-bottom: 15px;
  cursor: pointer;
}

footer {
  background: black;
  text-align: center;
  padding: 20px;
}
</style>

</head>
<body>

<header>
  <h1>VELMORA</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Premium Streetwear</h1>
  <p>Gym | Shoes | Fashion</p>
</section>

<section class="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
    <h3>Running Shoes</h3>
    <p>₹2999</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1520975922284-9e0ce8277f9f">
    <h3>Gym T-Shirt</h3>
    <p>₹999</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1600180758890-6b94519a8ba3">
    <h3>Hoodie</h3>
    <p>₹1999</p>
    <button>Buy Now</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1593032465171-8d6a1fdb2e0b">
    <h3>Joggers</h3>
    <p>₹1499</p>
    <button>Buy Now</button>
  </div>

</section>

<footer>
  © 2026 Velmora Themes
</footer>

</body>
</html>
